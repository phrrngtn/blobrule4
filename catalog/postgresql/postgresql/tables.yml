name: tables
description: User tables with row estimates, trigger summary, and table kind
dialect: postgresql
parameters:
  schema_name:
    type: string
    required: false
    description: Schema filter (exact match). Omit for all schemas.
    where: "nsp.nspname = :schema_name"
  table_name:
    type: string
    required: false
    description: Table filter (exact match). Omit for all tables.
    where: "cl.relname = :table_name"
sql: |
  SELECT
      nsp.nspname              AS table_schema,
      cl.relname               AS table_name,
      CASE cl.relkind
          WHEN 'r' THEN 'TABLE'
          WHEN 'p' THEN 'PARTITIONED TABLE'
          WHEN 'f' THEN 'FOREIGN TABLE'
      END                      AS type_desc,
      CAST(cl.reltuples AS bigint) AS row_count_estimate,
      cl.relpages              AS page_count,
      cl.relhasindex            AS has_indexes,
      cl.relhasrules            AS has_rules,
      cl.relhastriggers         AS has_triggers,
      cl.relrowsecurity         AS row_security_enabled,
      obj_description(cl.oid)  AS table_comment,
      trig.trigger_count,
      trig.enabled_trigger_count,
      trig.before_count,
      trig.after_count,
      trig.instead_of_count
  FROM pg_class AS cl
  JOIN pg_namespace AS nsp ON nsp.oid = cl.relnamespace
  LEFT JOIN (
      SELECT
          tgrelid,
          COUNT(*)                                                     AS trigger_count,
          SUM(CASE WHEN tgenabled != 'D' THEN 1 ELSE 0 END)           AS enabled_trigger_count,
          SUM(CASE WHEN tgtype & 2 != 0 THEN 1 ELSE 0 END)            AS before_count,
          SUM(CASE WHEN tgtype & 2 = 0 AND tgtype & 64 = 0
                   THEN 1 ELSE 0 END)                                  AS after_count,
          SUM(CASE WHEN tgtype & 64 != 0 THEN 1 ELSE 0 END)           AS instead_of_count
      FROM pg_trigger
      WHERE NOT tgisinternal
      GROUP BY tgrelid
  ) AS trig ON trig.tgrelid = cl.oid
  WHERE cl.relkind IN ('r', 'p', 'f')
    AND nsp.nspname NOT IN ('pg_catalog', 'information_schema', 'pg_toast')
    AND nsp.nspname NOT LIKE 'pg_temp_%'
    AND nsp.nspname NOT LIKE 'pg_toast_temp_%'

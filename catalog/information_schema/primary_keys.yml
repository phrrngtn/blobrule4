name: primary_keys
description: Primary keys via INFORMATION_SCHEMA (works on SQL Server, PostgreSQL, DuckDB)
dialect: information_schema
parameters:
  schema_name:
    type: string
    required: false
    description: Schema filter (exact match). Omit for all schemas.
    where: "tc.table_schema = :schema_name"
  table_name:
    type: string
    required: false
    description: Table filter (exact match). Omit for all tables.
    where: "tc.table_name = :table_name"
sql: |
  SELECT
      tc.constraint_catalog,
      tc.constraint_schema,
      tc.constraint_name,
      tc.table_schema,
      tc.table_name,
      kcu.column_name,
      kcu.ordinal_position AS key_seq
  FROM information_schema.table_constraints AS tc
  JOIN information_schema.key_column_usage AS kcu
      ON kcu.constraint_catalog = tc.constraint_catalog
     AND kcu.constraint_schema = tc.constraint_schema
     AND kcu.constraint_name = tc.constraint_name
  WHERE tc.constraint_type = 'PRIMARY KEY'

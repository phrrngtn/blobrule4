name: callables
description: User functions, table-valued functions, and stored procedures with parameter signatures and source
dialect: sqlserver
parameters:
  schema_name:
    type: string
    required: false
    description: Schema filter (exact match). Omit for all schemas.
    where: "SCHEMA_NAME(o.schema_id) = :schema_name"
  object_name:
    type: string
    required: false
    description: Object name filter. Omit for all callables.
    where: "o.name = :object_name"
sql: |
  SELECT
      SCHEMA_NAME(o.schema_id)  AS object_schema,
      o.name                    AS object_name,
      o.type_desc,
      o.create_date,
      o.modify_date,
      p.name                    AS parameter_name,
      p.parameter_id,
      TYPE_NAME(p.user_type_id) AS parameter_type_name,
      p.max_length              AS parameter_max_length,
      p.precision               AS parameter_precision,
      p.scale                   AS parameter_scale,
      p.is_output,
      p.has_default_value,
      p.is_readonly,
      OBJECT_DEFINITION(o.object_id) AS object_definition
  FROM sys.objects AS o
  LEFT JOIN sys.parameters AS p
      ON p.object_id = o.object_id
  WHERE o.type IN ('FN', 'IF', 'TF', 'P', 'AF')
    AND o.is_ms_shipped = 0

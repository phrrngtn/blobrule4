name: indexes
description: Index definitions with columns, included columns, and filter predicates
dialect: sqlserver
parameters:
  schema_name:
    type: string
    required: false
    description: Schema filter (exact match). Omit for all schemas.
    where: "SCHEMA_NAME(t.schema_id) = :schema_name"
  table_name:
    type: string
    required: false
    description: Table filter (exact match). Omit for all tables.
    where: "t.name = :table_name"
sql: |
  SELECT
      SCHEMA_NAME(t.schema_id)             AS table_schema,
      t.name                               AS table_name,
      i.name                               AS index_name,
      i.type_desc                          AS index_type,
      i.is_unique,
      i.is_primary_key,
      i.is_unique_constraint,
      COL_NAME(ic.object_id, ic.column_id) AS column_name,
      ic.key_ordinal,
      ic.is_descending_key,
      ic.is_included_column,
      i.has_filter,
      i.filter_definition
  FROM sys.indexes AS i
  JOIN sys.tables AS t
      ON t.object_id = i.object_id
  JOIN sys.index_columns AS ic
      ON ic.object_id = i.object_id
     AND ic.index_id = i.index_id
  WHERE i.type > 0

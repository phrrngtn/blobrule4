name: foreign_keys
description: All foreign key constraints with column mappings, update/delete rules
dialect: sqlserver
parameters:
  schema_name:
    type: string
    required: false
    description: Schema filter (exact match). Omit for all schemas.
    where: "SCHEMA_NAME(fk.schema_id) = :schema_name"
  table_name:
    type: string
    required: false
    description: FK table filter (exact match). Omit for all tables.
    where: "OBJECT_NAME(fk.parent_object_id) = :table_name"
sql: |
  SELECT
      fk.name                          AS constraint_name,
      SCHEMA_NAME(fk.schema_id)        AS fk_schema,
      OBJECT_NAME(fk.parent_object_id) AS fk_table,
      COL_NAME(fkc.parent_object_id, fkc.parent_column_id) AS fk_column,
      SCHEMA_NAME(pk_tab.schema_id)    AS pk_schema,
      OBJECT_NAME(fk.referenced_object_id) AS pk_table,
      COL_NAME(fkc.referenced_object_id, fkc.referenced_column_id) AS pk_column,
      fkc.constraint_column_id         AS key_seq,
      fk.delete_referential_action     AS delete_rule,
      fk.update_referential_action     AS update_rule,
      fk.is_disabled,
      fk.is_not_trusted
  FROM sys.foreign_keys AS fk
  JOIN sys.foreign_key_columns AS fkc
      ON fkc.constraint_object_id = fk.object_id
  JOIN sys.tables AS pk_tab
      ON pk_tab.object_id = fk.referenced_object_id
